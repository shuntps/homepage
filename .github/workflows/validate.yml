name: Validation

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        uses: ./.github/actions/setup

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Analyze Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  yamllint:
    name: Lint YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install --user yamllint

      - name: Analyze YAML files
        run: yamllint --strict .

  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Analyze GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  compose:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate docker-compose.yml
        run: |
          docker compose --env-file .env.example config --quiet
          echo "docker-compose.yml is valid"

  gitleaks:
    name: Secret detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker image (build, smoke test, scan)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: homepage:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        run: |
          set -euo pipefail
          container="homepage-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm -f "$container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name "$container" -p 3000:3000 -e SITE_DOMAIN=ci.local homepage:ci
          ok=0
          for _ in {1..30}; do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::The container did not respond after 30 seconds"
            docker logs "$container"
            exit 1
          fi
          curl -fsS -o /dev/null http://localhost:3000/robots.txt
          curl -fsS -o /dev/null http://localhost:3000/.well-known/security.txt
          curl -fsS -o /dev/null http://localhost:3000/opengraph-image
          echo "Smoke test OK: /, /robots.txt, /.well-known/security.txt, and /opengraph-image respond"

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: homepage:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln
