name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: shuntps/homepage

jobs:
  validate:
    name: Validation
    uses: ./.github/workflows/validate.yml
    permissions:
      contents: read

  release:
    name: Version, tag, and GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released: ${{ steps.tag.outputs.new_tag != '' }}
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute version (Conventional Commits)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false
          fetch_all_tags: true

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Summary
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          if [ -n "$NEW_TAG" ]; then
            echo "### Release $NEW_TAG created" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No release: no feat/fix commits since the previous version" >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Docker Hub publishing
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.tag }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### Image published to Docker Hub"
            echo ""
            echo '```'
            echo "$META_TAGS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
